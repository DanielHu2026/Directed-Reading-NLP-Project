project:
  name: l2affect_lba
  random_seed: 42

paths:
  data_dir: data
  raw_dir: data/raw
  processed_dir: data/processed
  reports_figures_dir: reports/figures
  reports_tables_dir: reports/tables

inputs:
  # Place files under data/raw/
  l2_lexicon_file: data/raw/lexicons/imbault_l2_vad.csv
  l1_lexicon_file: data/raw/lexicons/l1_vad.csv
  reddit_posts_file: data/raw/reddit/writestreaken_posts.csv

lexicon_columns:
  word: word
  valence: valence
  arousal: arousal

gap_definition:
  mode: quantile          # quantile | absolute
  quantile: 0.90
  absolute_threshold: 0.75

text_processing:
  lowercase: true
  remove_urls: true
  remove_markdown: true
