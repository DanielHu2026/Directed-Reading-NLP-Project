project:
  name: directed_reading_project
  random_seed: 42

paths:
  data_dir: data
  raw_dir: data/raw
  processed_dir: data/processed
  reports_figures_dir: reports/figures
  reports_tables_dir: reports/tables

inputs:
  imbault_lexicon_file: data/raw/lexicons/imbault.csv
  NRC_lexicon_file: data/raw/lexicons/NRC-VAD-Lexicon-v2.1.txt
  writestreak_posts_jsonl_dir: data/raw/reddit/writestreak/posts
  writestreak_comments_jsonl_dir: data/raw/reddit/writestreak/comments

lexicon_columns:
  word: word
  valence: valence
  arousal: arousal

gap_definition:
  mode: quantile          # quantile | absolute
  quantile: 0.90
  absolute_threshold: 0.75

text_processing:
  lowercase: true
  remove_urls: true
  remove_markdown: true
